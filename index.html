<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Viborita</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f0f0e8;
      gap: 16px;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #4ade80;
      text-transform: uppercase;
    }

    .hud {
      display: flex;
      gap: 32px;
      font-size: 14px;
      color: #888;
    }

    .hud span { color: #f0f0e8; font-weight: 500; }

    #board {
      border: 2px solid #1e2330;
      border-radius: 12px;
      display: block;
      background: #13161f;
      box-shadow: 0 0 40px rgba(74, 222, 128, 0.08);
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(13, 16, 23, 0.88);
      border-radius: 12px;
      backdrop-filter: blur(4px);
    }

    .overlay h2 {
      font-size: 26px;
      font-weight: 600;
      color: #f0f0e8;
    }

    .overlay p { font-size: 14px; color: #888; }

    .overlay button {
      margin-top: 8px;
      padding: 10px 28px;
      background: #4ade80;
      color: #0f1117;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .overlay button:hover  { background: #22c55e; }
    .overlay button:active { transform: scale(0.96); }

    .wrap {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
    }

    /* Mobile controls */
    .dpad {
      display: grid;
      grid-template-areas: ". up ." "left . right" ". down .";
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(3, 56px);
      gap: 6px;
      margin-top: 8px;
    }

    .dpad button {
      background: #1e2330;
      border: 1px solid #2a2f3f;
      border-radius: 10px;
      color: #aaa;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, transform 0.08s;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad button:active { background: #2a2f3f; transform: scale(0.92); }
    .dpad .up    { grid-area: up; }
    .dpad .left  { grid-area: left; }
    .dpad .right { grid-area: right; }
    .dpad .down  { grid-area: down; }

    .hint { font-size: 12px; color: #444; margin-top: 4px; }
  </style>
</head>
<body>

  <h1>🐍 La Viborita</h1>

  <div class="hud">
    Puntos: <span id="score">0</span> &nbsp;&nbsp; Récord: <span id="best">0</span>
  </div>

  <div class="wrap">
    <canvas id="board" width="400" height="400"></canvas>

    <div class="overlay" id="overlay">
      <h2 id="overlay-title">¡Lista para jugar!</h2>
      <p id="overlay-msg">Usa las flechas del teclado o los botones</p>
      <button id="start-btn">Iniciar</button>
    </div>
  </div>

  <div class="dpad">
    <button class="up"    id="btn-up">▲</button>
    <button class="left"  id="btn-left">◀</button>
    <button class="right" id="btn-right">▶</button>
    <button class="down"  id="btn-down">▼</button>
  </div>

  <p class="hint">Teclado: flechas · Móvil: botones de dirección</p>

  <script>
  (function () {
    const COLS = 20, ROWS = 20;
    const CELL = 400 / COLS;
    const canvas = document.getElementById('board');
    const ctx    = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl  = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayMsg   = document.getElementById('overlay-msg');
    const startBtn     = document.getElementById('start-btn');

    let snake, dir, nextDir, food, score, best = 0, loop, alive;

    const COLORS = {
      head:     '#4ade80',
      body:     '#22c55e',
      bodyDark: '#16a34a',
      food:     '#f87171',
      foodGlow: 'rgba(248,113,113,0.25)',
      grid:     '#161a24',
      bg:       '#13161f',
    };

    function rnd(max) { return Math.floor(Math.random() * max); }

    function spawnFood() {
      let pos;
      do {
        pos = { x: rnd(COLS), y: rnd(ROWS) };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function init() {
      const cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
      snake = [
        { x: cx,     y: cy },
        { x: cx - 1, y: cy },
        { x: cx - 2, y: cy },
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      scoreEl.textContent = 0;
      alive = true;
      spawnFood();
    }

    function drawBg() {
      ctx.fillStyle = COLORS.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = COLORS.grid;
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * CELL, 0);
        ctx.lineTo(x * CELL, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * CELL);
        ctx.lineTo(canvas.width, y * CELL);
        ctx.stroke();
      }
    }

    function drawRoundRect(x, y, w, h, r, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, r);
      ctx.fill();
    }

    function drawSnake() {
      const pad = 2;
      snake.forEach((seg, i) => {
        const px = seg.x * CELL + pad;
        const py = seg.y * CELL + pad;
        const sz = CELL - pad * 2;

        if (i === 0) {
          // Head
          drawRoundRect(px, py, sz, sz, 6, COLORS.head);
          // Eyes
          const ex = dir.x, ey = dir.y;
          ctx.fillStyle = '#0f1117';
          const ew = 3, eh = 3;
          const ox1 = sz * 0.3, ox2 = sz * 0.65;
          const oy  = sz * 0.3;
          // rotate eye positions based on direction
          let e1x, e1y, e2x, e2y;
          if (ex === 1) { e1x = px + sz*0.65; e1y = py + sz*0.28; e2x = px + sz*0.65; e2y = py + sz*0.62; }
          else if (ex === -1) { e1x = px + sz*0.2; e1y = py + sz*0.28; e2x = px + sz*0.2; e2y = py + sz*0.62; }
          else if (ey === -1) { e1x = px + sz*0.28; e1y = py + sz*0.2; e2x = px + sz*0.62; e2y = py + sz*0.2; }
          else { e1x = px + sz*0.28; e1y = py + sz*0.65; e2x = px + sz*0.62; e2y = py + sz*0.65; }
          ctx.beginPath(); ctx.arc(e1x, e1y, 2.5, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(e2x, e2y, 2.5, 0, Math.PI*2); ctx.fill();
        } else {
          const shade = i % 2 === 0 ? COLORS.body : COLORS.bodyDark;
          drawRoundRect(px, py, sz, sz, 4, shade);
        }
      });
    }

    function drawFood() {
      const px = food.x * CELL, py = food.y * CELL;
      const cx = px + CELL / 2, cy = py + CELL / 2, r = CELL / 2 - 3;
      // Glow
      ctx.fillStyle = COLORS.foodGlow;
      ctx.beginPath();
      ctx.arc(cx, cy, r + 4, 0, Math.PI * 2);
      ctx.fill();
      // Apple
      ctx.fillStyle = COLORS.food;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
      // Shine
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath();
      ctx.arc(cx - r*0.25, cy - r*0.25, r*0.35, 0, Math.PI*2);
      ctx.fill();
    }

    function step() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        gameOver(); return;
      }
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        gameOver(); return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        if (score > best) { best = score; bestEl.textContent = best; }
        spawnFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      drawBg();
      drawFood();
      drawSnake();
    }

    function getSpeed() {
      if (score < 5)  return 160;
      if (score < 10) return 130;
      if (score < 20) return 100;
      if (score < 35) return 80;
      return 65;
    }

    let loopTimeout;
    function gameLoop() {
      step();
      if (alive) loopTimeout = setTimeout(gameLoop, getSpeed());
    }

    function startGame() {
      clearTimeout(loopTimeout);
      overlay.style.display = 'none';
      init();
      draw();
      loopTimeout = setTimeout(gameLoop, getSpeed());
    }

    function gameOver() {
      alive = false;
      clearTimeout(loopTimeout);
      overlayTitle.textContent = score === 0 ? '¡Ay!' : score < 5 ? '¡Casi!' : score < 15 ? '¡Bien jugado!' : '¡Excelente!';
      overlayMsg.textContent   = `Puntuación: ${score}`;
      startBtn.textContent     = 'Jugar de nuevo';
      overlay.style.display    = 'flex';
    }

    // Controls
    const DIRS = {
      ArrowUp:    { x:  0, y: -1 },
      ArrowDown:  { x:  0, y:  1 },
      ArrowLeft:  { x: -1, y:  0 },
      ArrowRight: { x:  1, y:  0 },
    };

    function setDir(d) {
      // Prevent 180° reversal
      if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
    }

    document.addEventListener('keydown', e => {
      if (DIRS[e.key]) { e.preventDefault(); setDir(DIRS[e.key]); }
    });

    document.getElementById('btn-up').addEventListener('click',    () => setDir({ x:  0, y: -1 }));
    document.getElementById('btn-down').addEventListener('click',  () => setDir({ x:  0, y:  1 }));
    document.getElementById('btn-left').addEventListener('click',  () => setDir({ x: -1, y:  0 }));
    document.getElementById('btn-right').addEventListener('click', () => setDir({ x:  1, y:  0 }));

    startBtn.addEventListener('click', startGame);

    // Initial draw
    init();
    draw();
    overlay.style.display = 'flex';
  })();
  </script>

</body>
</html>
